<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <style>
        *{
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: white;
        }

        body{
            background-color: #3c3c3c;
        }

        .container{
            position: relative;
        }

        .logo img{
            width: 150px;
            height: 100px;
        }

        .heading{
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 35%;
            min-height: 65vh;
            margin-left: 100px;
        }

        h1{
            padding-bottom: 15px;
            font-size: 40px;
        }

        .heading p{
            padding-bottom: 20px;
            font-size: 18px;
        }

        button{
            width: 150px;
            height: 50px;
            background-color: red;
            border: none;
            cursor: pointer;
        }

        ul{
            display: flex;
            position: absolute;
            right: 0;
            top: 0;
            list-style: none;
        }

        li{
            padding: 40px;
        }

        .empty{
            position: absolute;
            clip-path: polygon(77% 0, 100% 0, 100% 100%, 40% 100%);
            background-color: red;
            width: 100%;
            height: 100vh;
            top: 0;
            right: 0;
            z-index: -1;
        }
    </style>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <!-- JS -->
    <script>
        $(document).ready(function(){
            $("#body").fadeIn(1000);

            function logo(){
                $("#logo").fadeToggle(500);
            }
            setInterval(logo,1000);

            $("p").slideDown(2000);

            $(".kl").click(function(){
                $(".hp").show();
            });
        });
    </script>

</head>

<body id="body" style="display:none">

    <div class="container">

        <div class="logo">
            <img src="logo.png" id="logo" style="display:none">
        </div>

        <div class="heading">
            <h1>Indian Premier League 2026</h1>

            <p style="display:none">
                IPL 2026 is the nineteenth season of the Indian Premier League.
                Organized by BCCI with teams representing different cities.
            </p>

            <button class="kl">WATCH NOW</button>

            <video width="400" controls style="display:none" class="hp">
                <source src="2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="navbar">
            <ul>
                <li>Home</li>
